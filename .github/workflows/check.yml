# Taken from https://github.com/argenos/nldates-obsidian/blob/master/.github/workflows/release.yml
name: Build and test

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.11.0" # You might need to adjust this value to your own version
      - name: Pin npm version
        run: |
         npm i -g npm@11.6.1
      - name: Build
        id: build
        run: |
          npm --version
          npm install
          npm run lint
          npm run build --if-present
          npm test
